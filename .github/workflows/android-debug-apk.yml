name: Build Debug APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build-debug:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle (with caching)
        uses: gradle/actions/setup-gradle@v4

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Prepare local.properties
        run: |
          if [ -f local.properties ]; then
            grep -v '^sdk.dir=' local.properties > local.properties.tmp
          else
            touch local.properties.tmp
          fi
          echo "sdk.dir=${ANDROID_SDK_ROOT}" > local.properties
          cat local.properties.tmp >> local.properties
          rm -f local.properties.tmp

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Decode signing keystore (optional)
        if: ${{ secrets.SIGNING_KEYSTORE_BASE64 != '' }}
        run: |
          echo "${{ secrets.SIGNING_KEYSTORE_BASE64 }}" | base64 -d > ${{ github.workspace }}/keystore.jks

      - name: Build debug APK
        run: ./gradlew assembleDebug
        env:
          SIGNING_STORE_FILE: ${{ github.workspace }}/keystore.jks
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Publish latest debug APK to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: debug-latest
          name: Debug APK (Latest)
          prerelease: false
          draft: false
          generate_release_notes: false
          files: app/build/outputs/apk/debug/app-debug.apk
